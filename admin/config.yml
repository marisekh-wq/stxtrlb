backend:
  name: github
  repo: marisekh-wq/stxtrlb
  branch: main
  base_url: https://stxtr-oauth.YOUR_SUBDOMAIN.workers.dev

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:

  # ── WEBSITE TEXT & COLOURS ────────────────────────────────────
  - name: "site"
    label: "✏️ Website Text & Settings"
    files:
      - label: "Homepage Content"
        name: "content"
        file: "data/content.json"
        format: json
        fields:
          - label: "Hero Tagline"
            name: "tagline"
            widget: "string"
            hint: "The text under the big STXTR title"
          - label: "About Text"
            name: "about1"
            widget: "text"
            hint: "First paragraph in the About section"
          - label: "About Text 2"
            name: "about2"
            widget: "text"
            hint: "Second paragraph in the About section"
          - label: "Instagram URL"
            name: "instagram"
            widget: "string"
            default: "https://www.instagram.com/stxtrlb"
          - label: "TikTok URL"
            name: "tiktok"
            widget: "string"
            default: "https://www.tiktok.com/@stxtrlb"
          - label: "Sticker Price ($ each)"
            name: "sticker_price"
            widget: "number"
            default: 2
          - label: "Pouch Base Price ($)"
            name: "pouch_base"
            widget: "number"
            default: 2
            hint: "Pouch + 1 patch = this + 1, + 2 patches = this + 2, etc."

  # ── COLOURS ───────────────────────────────────────────────────
  - name: "colors"
    label: "🎨 Website Colors"
    files:
      - label: "Color Scheme"
        name: "colors"
        file: "data/colors.json"
        format: json
        fields:
          - label: "Primary Color (buttons, logo, accents)"
            name: "primary"
            widget: "color"
            default: "#D42020"
            hint: "Main brand color — currently red"
          - label: "Secondary Color (sticker selection, steps)"
            name: "secondary"
            widget: "color"
            default: "#5A8FBF"
            hint: "Secondary accent — currently blue"
          - label: "Dark Color (backgrounds, borders)"
            name: "dark"
            widget: "color"
            default: "#0A0A0F"
            hint: "Dark sections — currently near-black"
          - label: "Page Background"
            name: "background"
            widget: "color"
            default: "#F8F5EF"
            hint: "Light sections background — currently off-white"
          - label: "Hero Title Color"
            name: "hero_title"
            widget: "color"
            default: "#D42020"
            hint: "The big STXTR text color on the homepage"
          - label: "Social Section Background"
            name: "social_bg"
            widget: "color"
            default: "#D42020"
            hint: "Background of the Instagram/TikTok section"

  # ── PRODUCT PHOTOS ────────────────────────────────────────────
  - name: "products"
    label: "🖼️ Product Photos"
    files:
      - label: "Product Images"
        name: "product_images"
        file: "data/products.json"
        format: json
        fields:
          - label: "Canvas Pouches Photo"
            name: "pouch"
            widget: "image"
            hint: "Photo shown on the Canvas Pouches card"
          - label: "Phone Case Stickers Photo"
            name: "stickers"
            widget: "image"
            hint: "Photo shown on the Phone Stickers card"
          - label: "Patches Photo"
            name: "patches"
            widget: "image"
            hint: "Photo shown on the Patches card"
          - label: "About / Brand Photo"
            name: "brand"
            widget: "image"
            hint: "Photo shown in the About section"

  # ── PHOTO GALLERY ─────────────────────────────────────────────
  - name: "gallery"
    label: "📸 Photo Gallery"
    files:
      - label: "Gallery Photos"
        name: "gallery"
        file: "data/gallery.json"
        format: json
        fields:
          - label: "Photos"
            name: "photos"
            widget: "list"
            summary: "{{fields.caption}}"
            hint: "Click 'Add Photos' to add as many as you want. You can upload multiple images to the media library at once."
            fields:
              - label: "Photo"
                name: "img"
                widget: "image"
                hint: "Upload your product photo"
              - label: "Caption"
                name: "caption"
                widget: "string"
                required: false
                hint: "e.g. Canvas Pouch — Pink Zipper"
              - label: "Category"
                name: "type"
                widget: "select"
                options:
                  - {label: "Pouch",   value: "pouch"}
                  - {label: "Sticker", value: "sticker"}
                  - {label: "Patch",   value: "patch"}
                  - {label: "All",     value: "all"}

  # ── PATCHES ───────────────────────────────────────────────────
  - name: "patches"
    label: "🌟 Patches"
    files:
      - label: "All Patches"
        name: "patches_list"
        file: "data/patches.json"
        format: json
        fields:
          - label: "Patches"
            name: "list"
            widget: "list"
            summary: "{{fields.name}}"
            hint: >
              To bulk-add: open the Media Library (top-right 🖼️), upload all your
              images at once, then click "Add Patches" below for each new item and
              pick the image you already uploaded — no re-uploading needed.
            fields:
              - label: "Name"
                name: "name"
                widget: "string"
                required: false
                hint: "Optional — leave blank and it will be named automatically"
              - label: "Images"
                name: "imgs"
                widget: "list"
                label_singular: "Image"
                hint: "Add one or more photos for this patch (first photo is shown in the shop)"
                field:
                  label: "Image"
                  widget: "image"

  # ── STICKERS ──────────────────────────────────────────────────
  - name: "stickers"
    label: "🎨 Stickers"
    files:
      - label: "All Stickers"
        name: "stickers_list"
        file: "data/stickers.json"
        format: json
        fields:
          - label: "Stickers"
            name: "list"
            widget: "list"
            summary: "{{fields.name}}"
            hint: >
              To bulk-add: open the Media Library (top-right 🖼️), upload all your
              images at once, then click "Add Stickers" below for each new item and
              pick the image you already uploaded — no re-uploading needed.
            fields:
              - label: "Name"
                name: "name"
                widget: "string"
                required: false
                hint: "Optional — leave blank and it will be named automatically"
              - label: "Category"
                name: "cat"
                widget: "select"
                options:
                  - {label: "Cute", value: "cute"}
                  - {label: "Aesthetic", value: "aesthetic"}
                  - {label: "Nature", value: "nature"}
                  - {label: "Words", value: "words"}
              - label: "Images"
                name: "imgs"
                widget: "list"
                label_singular: "Image"
                hint: "Add one or more photos for this sticker (first photo is shown in the shop)"
                field:
                  label: "Image"
                  widget: "image"
